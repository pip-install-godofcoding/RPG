<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Realm of Ashenveil — 2D RPG</title>
  <meta name="description" content="A dark fantasy top-down 2D RPG with multiplayer, quests, and DBMS educational mode"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; touch-action: none; }
    #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; max-width:100%; max-height:100%; }

    /* ── Login Overlay ── */
    #login-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.88); z-index: 1000;
      font-family: 'Press Start 2P', monospace; color: #e0d0b0;
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      padding: 20px;
    }
    #login-overlay.active { display: flex; }
    #login-overlay h1 { font-size: clamp(10px, 3vw, 18px); text-align:center; }
    #login-overlay input {
      font-family: 'Press Start 2P', monospace; font-size: clamp(10px, 2.5vw, 14px);
      padding: 12px 20px; background: #1a1a2e; border: 2px solid #e0d0b0;
      color: #e0d0b0; outline: none; text-align: center;
      width: min(300px, 85vw);
    }
    #login-overlay button {
      font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 2vw, 12px);
      padding: 12px 30px; background: #2a1a3e; border: 2px solid #a855f7;
      color: #a855f7; cursor: pointer; transition: all 0.2s;
      width: min(280px, 80vw);
    }
    #login-overlay button:hover, #login-overlay button:active { background: #a855f7; color: #0a0a0f; }

    /* ── Mobile: hide DBMS panel in portrait if tiny ── */
    @media (max-width: 480px) and (orientation: portrait) {
      #battle-dbms { display: none !important; }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DiixV2FF.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="login-overlay">
    <div style="font-size:18px; margin-bottom:10px;">ENTER THY NAME</div>
    <input type="text" id="username-input" maxlength="32" placeholder="Hero name..." autofocus/>
    <button id="login-btn">ENTER THE REALM</button>
  </div>
</body>
</html>
